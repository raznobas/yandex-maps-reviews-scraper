services:
  app:
    build:
      context: .
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer
      APP_URL: http://72.56.232.124
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: yamap_integration
      DB_USERNAME: yamap
      DB_PASSWORD: yamap
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      ALL_PROXY: ${PROXY_URL}
      all_proxy: ${PROXY_URL}
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
      NO_PROXY: localhost,127.0.0.1,mysql
      no_proxy: localhost,127.0.0.1,mysql
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: yamap_integration
      MYSQL_USER: yamap
      MYSQL_PASSWORD: yamap
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    profiles:
      - assets
    command: sh -c "npm install && npm run build"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    depends_on:
      - app

  queue:
    build:
      context: .
    restart: always
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer
      APP_URL: http://72.56.232.124
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: yamap_integration
      DB_USERNAME: yamap
      DB_PASSWORD: yamap
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      ALL_PROXY: ${PROXY_URL}
      all_proxy: ${PROXY_URL}
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
      NO_PROXY: localhost,127.0.0.1,mysql
      no_proxy: localhost,127.0.0.1,mysql
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  composer-cache:
  mysql-data:
  node-modules:
